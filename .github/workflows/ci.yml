name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdbus-1-3 libexpat1 \
            libgbm1 libpango-1.0-0 libpangocairo-1.0-0 libx11-6 libx11-xcb1 \
            libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
            libxi6 libxinerama1 libxrandr2 libxrender1 libxss1 libxtst6 \
            libxkbcommon0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Run tests
        run: pytest -v
